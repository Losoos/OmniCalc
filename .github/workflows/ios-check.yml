name: iOS Framework Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.10
        # Tímto vypneme ověřování tvého lokálního wrapperu, které hází chybu
        wrapper-validation-enabled: false

    - name: Build iOS Framework
      # Místo ./gradlew použijeme přímo gradle
      run: gradle :shared:assembleSharedReleaseFrameworkForIosArm64
