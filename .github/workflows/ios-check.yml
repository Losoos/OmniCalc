name: iOS Build

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.10
        wrapper-validation-enabled: false

    - name: Build Shared Framework for iOS
      run: gradle :shared:assembleSharedReleaseFrameworkForIosArm64

    - name: List artifacts
      run: find shared/build/fat-framework -name "*.framework" || echo "Framework not found"
